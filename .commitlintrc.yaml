# 🚨 Commitlint — Conventional Commits 规范
#
# 格式: type(scope?): subject
#
# 常用 type:
#   feat      — 新功能
#   fix       — Bug 修复
#   docs      — 文档变更
#   style     — 代码格式（不影响逻辑）
#   refactor  — 重构
#   perf      — 性能优化
#   test      — 测试
#   build     — 构建系统 / 依赖
#   ci        — CI/CD 配置
#   chore     — 杂项
#   revert    — 回滚
#
# 示例:
#   feat: 添加首页轮播图组件
#   fix(auth): 修复登录 token 过期未刷新问题
#   docs: 更新 API 接口文档

extends:
  - '@commitlint/config-conventional'

rules:
  # scope 必须全小写
  scope-case:
    - 2 # error
    - always
    - lower-case
